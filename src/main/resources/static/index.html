<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 100%; max-width: 400px; border-radius: 15px; border: none; }
        .task-card { border-radius: 10px; transition: all 0.2s ease; border: none; border-left: 6px solid #0d6efd; }
        .task-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important; }
        .task-card.done { border-left-color: #198754; opacity: 0.85; background-color: #fcfcfc; }
        .task-title.done { text-decoration: line-through; color: #6c757d; }
        .add-task-card { border-radius: 15px; border: none; background: linear-gradient(145deg, #ffffff, #f8f9fa); }
        .nav-tabs .nav-link { color: #6c757d; font-weight: bold; cursor: pointer; }
        .nav-tabs .nav-link.active { color: #0d6efd !important; }
    </style>
</head>
<body>

<div id="authSection" class="auth-container">
    <div class="card auth-card shadow-lg p-4">
        <div class="text-center mb-3">
            <i class="bi bi-check2-square text-primary" style="font-size: 2.5rem;"></i>
            <h3 class="mt-2 fw-bold">TaskTracker</h3>
        </div>

        <ul class="nav nav-tabs nav-fill mb-4" id="authTabs">
            <li class="nav-item">
                <a class="nav-link active" id="loginTab" onclick="switchAuthMode('login')">Вход</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="registerTab" onclick="switchAuthMode('register')">Регистрация</a>
            </li>
        </ul>

        <div class="mb-3">
            <label class="form-label small text-muted">Email адрес</label>
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-envelope"></i></span>
                <input type="email" id="email" class="form-control" placeholder="name@example.com">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label small text-muted">Пароль</label>
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
                <input type="password" id="pass" class="form-control" placeholder="••••••••">
            </div>
        </div>

        <div class="mb-4" id="repeatPasswordWrapper" style="display: none;">
            <label class="form-label small text-muted">Подтвердите пароль</label>
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-lock-fill"></i></span>
                <input type="password" id="repeatPass" class="form-control" placeholder="••••••••">
            </div>
        </div>

        <div class="d-grid gap-2">
            <button id="authBtn" onclick="submitAuth()" class="btn btn-primary py-2 fw-bold">Войти в систему</button>
        </div>
    </div>
</div>

<div id="appSection" style="display:none;">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="bi bi-check2-square me-2"></i>TaskTracker Pro</a>
            <div class="d-flex align-items-center">
                <span class="text-light me-3"><i class="bi bi-person-circle me-1"></i> <span id="currentUserEmail">Загрузка...</span></span>
                <button onclick="logout()" class="btn btn-sm btn-outline-light"><i class="bi bi-box-arrow-right me-1"></i>Выйти</button>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 900px;">

        <ul class="nav nav-pills mb-4" id="sectionTabs">
            <li class="nav-item">
                <button id="myTasksTab" class="nav-link active" onclick="switchView('my-tasks')"><i class="bi bi-list-task me-1"></i>Мои задачи</button>
            </li>
            <li class="nav-item">
                <button id="allUsersTab" class="nav-link" onclick="switchView('all-users')"><i class="bi bi-people me-1"></i>Все пользователи и задачи</button>
            </li>
        </ul>

        <div id="myTasksView">
            <div class="card add-task-card shadow-sm p-4 mb-4">
                <h5 class="mb-3 text-primary"><i class="bi bi-plus-circle me-2"></i>Добавить новую задачу</h5>
                <div class="input-group input-group-lg">
                    <input type="text" id="taskTitle" class="form-control" placeholder="Что нужно сделать?" onkeypress="handleEnter(event)">
                    <button onclick="createTask()" class="btn btn-primary px-4 fw-bold">Добавить</button>
                </div>
            </div>

            <div class="card p-3 mb-3 shadow-sm">
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                    <input type="text" id="taskSearch" class="form-control" placeholder="Поиск по названию задачи..." oninput="filterTasks()">
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3 px-1">
                <h4 class="mb-0 text-secondary">Список задач</h4>
                <span class="badge bg-secondary rounded-pill" id="taskCount">0</span>
            </div>

            <div id="taskList"></div>
        </div>

        <div id="allUsersView" style="display: none;">
            <h4 class="text-secondary mb-4">Общий список пользователей и закрепленных задач</h4>
            <div id="usersContainer" class="row row-cols-1 row-cols-md-2 g-4"></div>
        </div>

    </div>
</div>

<script>
    let allUsers = [];
    let currentUser = null;
    let myTasks = [];
    let currentAuthMode = 'login';

    const getHeaders = () => ({
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + localStorage.getItem('token')
    });

    if (localStorage.getItem('token')) {
        initApp();
    }

    function switchAuthMode(mode) {
        currentAuthMode = mode;
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const repeatPasswordWrapper = document.getElementById('repeatPasswordWrapper');
        const authBtn = document.getElementById('authBtn');

        if (mode === 'login') {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            repeatPasswordWrapper.style.display = 'none';
            authBtn.textContent = 'Войти в систему';
        } else {
            loginTab.classList.remove('active');
            registerTab.classList.add('active');
            repeatPasswordWrapper.style.display = 'block';
            authBtn.textContent = 'Зарегистрироваться';
        }
    }

    function switchView(view) {
        if (view === 'my-tasks') {
            document.getElementById('myTasksView').style.display = 'block';
            document.getElementById('allUsersView').style.display = 'none';
            document.getElementById('myTasksTab').classList.add('active');
            document.getElementById('allUsersTab').classList.remove('active');
            loadTasks();
        } else {
            document.getElementById('myTasksView').style.display = 'none';
            document.getElementById('allUsersView').style.display = 'block';
            document.getElementById('myTasksTab').classList.remove('active');
            document.getElementById('allUsersTab').classList.add('active');
            loadAllUsersReport();
        }
    }

    async function submitAuth() {
        const mail = email.value.trim();
        const password = pass.value;
        const repeat = repeatPass.value;

        const emailRegex = /^[A-Za-z0-9._%+-]+@(gazprom-neft\.ru|mail\.ru|yandex\.ru|gmail\.com)$/i;
        if (!emailRegex.test(mail)) {
            alert('Ошибка: Допустимы только латиница и домены: gazprom-neft.ru, mail.ru, yandex.ru, gmail.com');
            return;
        }

        if (currentAuthMode === 'register') {
            if (!password || password.length < 4) {
                alert('Ошибка: Пароль должен быть не менее 4 символов!');
                return;
            }
            if (password !== repeat) {
                alert('Ошибка: Пароли не совпадают!');
                return;
            }
        }

        const url = currentAuthMode === 'login' ? '/login' : '/register';
        const body = currentAuthMode === 'login'
            ? { email: mail, password: password }
            : { email: mail, password: password, repeatPassword: password };

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('token', data.token);
                initApp();
            } else {
                if (res.status === 409) {
                    alert('Ошибка регистрации: Пользователь с таким Email уже существует в системе!');
                } else if (res.status === 401) {
                    if (confirm('Ошибка входа: Неверный логин или пароль. Хотите зарегистрировать новый аккаунт с этими данными?')) {
                        switchAuthMode('register');
                    }
                } else {
                    const err = await res.json();
                    alert('Ошибка: ' + (err.message || 'Проверьте введенные данные'));
                }
            }
        } catch (e) {
            alert('Ошибка соединения с сервером');
        }
    }

    function logout() {
        localStorage.removeItem('token');
        location.reload();
    }

    async function initApp() {
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('appSection').style.display = 'block';

        await loadCurrentUser();
        await loadUsers();
        await loadTasks();
    }

    async function loadCurrentUser() {
        const res = await fetch('/me', { headers: getHeaders() });
        if (res.ok) {
            currentUser = await res.json();
            document.getElementById('currentUserEmail').textContent = currentUser.email;
        } else {
            logout();
        }
    }

    async function loadUsers() {
        const res = await fetch('/users', { headers: getHeaders() });
        if (res.ok) allUsers = await res.json();
    }

    async function loadTasks() {
        const res = await fetch('/tasks', { headers: getHeaders() });
        if (res.ok) {
            myTasks = await res.json();
            myTasks.sort((a, b) => (a.status === 'DONE') - (b.status === 'DONE'));
            renderTasks(myTasks);
        }
    }

    function filterTasks() {
        const query = document.getElementById('taskSearch').value.toLowerCase().trim();
        const filtered = myTasks.filter(t => t.title.toLowerCase().includes(query));
        renderTasks(filtered);
    }

    function renderTasks(tasks) {
        document.getElementById('taskCount').textContent = tasks.length;
        const list = document.getElementById('taskList');

        if (tasks.length === 0) {
            list.innerHTML = `<div class="text-center text-muted my-5 p-5 bg-white rounded shadow-sm">
                <i class="bi bi-inbox fs-1"></i><p class="mt-3">Задачи не найдены.</p></div>`;
            return;
        }

        list.innerHTML = tasks.map(t => {
            const isDone = t.status === 'DONE';
            const creator = allUsers.find(u => u.id === t.ownerId);
            const creatorEmail = creator ? creator.email : 'Неизвестно';
            const creatorText = t.ownerId === currentUser.id ? 'Вы' : creatorEmail;
            return `
            <div class="card shadow-sm mb-3 task-card ${isDone ? 'done' : ''}">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="task-title mb-0 ${isDone ? 'done' : ''}">${t.title}</h5>
                        <span class="badge ${isDone ? 'bg-success' : 'bg-primary'}">
                            ${isDone ? '<i class="bi bi-check-lg"></i> Выполнено' : 'В работе'}
                        </span>
                    </div>

                    <p class="text-muted small mb-2">
                        <i class="bi bi-person-fill me-1"></i>Создатель: <strong>${creatorText}</strong>
                    </p>
                    <p class="text-muted small mb-3">
                        <i class="bi bi-clock me-1"></i>Создана: ${new Date(t.createdAt).toLocaleString()}
                        ${isDone ? `<br><i class="bi bi-check2-all me-1 text-success"></i>Завершена: ${new Date(t.doneAt).toLocaleString()}` : ''}
                    </p>

                    <div class="row align-items-center bg-light p-2 rounded mx-0">
                        <div class="col-md-6 mb-2 mb-md-0 px-1">
                            <div class="input-group input-group-sm">
                                <span class="input-group-text bg-white"><i class="bi bi-person-workspace"></i></span>
                                <select onchange="assignUser(${t.id}, this.value)" class="form-select text-secondary border-start-0">
                                    <option value="">Без исполнителя</option>
                                    ${allUsers.map(u => `<option value="${u.id}" ${t.assigneeId === u.id ? 'selected' : ''}>${u.email === currentUser.email ? 'Я ('+u.email+')' : u.email}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6 d-flex justify-content-md-end gap-2 px-1">
                            <button onclick="editTask(${t.id}, '${t.title}')" class="btn btn-sm btn-outline-secondary" title="Изменить название">
                                <i class="bi bi-pencil-square"></i>
                            </button>
                            <button onclick="deleteTask(${t.id})" class="btn btn-sm btn-outline-danger" title="Удалить задачу">
                                <i class="bi bi-trash3"></i>
                            </button>
                            <button onclick="toggleStatus(${t.id}, ${!isDone})" class="btn btn-sm ${isDone ? 'btn-warning' : 'btn-success'}">
                                <i class="bi ${isDone ? 'bi-arrow-counterclockwise' : 'bi-check-lg'}"></i>
                                ${isDone ? 'Вернуть' : 'Выполнить'}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `}).join('');
    }

    function handleEnter(e) { if (e.key === 'Enter') createTask(); }

    async function createTask() {
        const title = document.getElementById('taskTitle').value.trim();
        if (!title) return;

        const isDuplicate = myTasks.some(t => t.title.toLowerCase() === title.toLowerCase());
        if (isDuplicate) {
            if (!confirm(`Задача с названием "${title}" уже существует. Вы действительно хотите создать дубликат? Нажмите "Отмена", чтобы этого избежать.`)) {
                return;
            }
        }

        await fetch('/tasks', {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify({title, description: ''})
        });
        document.getElementById('taskTitle').value = '';
        loadTasks();
    }

    async function deleteTask(id) {
        if (!confirm('Вы уверены, что хотите удалить эту задачу?')) return;
        await fetch(`/tasks/${id}`, { method: 'DELETE', headers: getHeaders() });
        loadTasks();
    }

    async function editTask(id, oldTitle) {
        const task = myTasks.find(t => t.id === id);
        if (task && task.ownerId !== currentUser.id) {
            alert('Ошибка: Редактировать название может только создатель задачи!');
            return;
        }
        const newTitle = prompt('Введите новое название задачи:', oldTitle);
        if (!newTitle || newTitle.trim() === oldTitle) return;
        await fetch(`/tasks/${id}`, {
            method: 'PUT',
            headers: getHeaders(),
            body: JSON.stringify({title: newTitle.trim(), description: ''})
        });
        loadTasks();
    }

    async function toggleStatus(id, done) {
        await fetch(`/tasks/${id}/status`, {
            method: 'PATCH',
            headers: getHeaders(),
            body: JSON.stringify({done})
        });
        loadTasks();
    }

    async function assignUser(taskId, userId) {
        const task = myTasks.find(t => t.id === taskId);
        if (task && task.ownerId !== currentUser.id) {
            alert('Ошибка: Вы не можете изменить исполнителя, так как эта задача была назначена вам другим пользователем.');
            loadTasks();
            return;
        }
        await fetch(`/tasks/${taskId}/assignee`, {
            method: 'PATCH',
            headers: getHeaders(),
            body: JSON.stringify({assigneeId: userId ? parseInt(userId) : null})
        });
        loadTasks();
    }

    async function loadAllUsersReport() {
        const usersRes = await fetch('/users', { headers: getHeaders() });
        const tasksRes = await fetch('/tasks/all-system', { headers: getHeaders() });

        if (usersRes.ok && tasksRes.ok) {
            const users = await usersRes.json();
            const allTasks = await tasksRes.json();
            renderAllUsersReport(users, allTasks);
        }
    }

    function renderAllUsersReport(users, tasks) {
        const container = document.getElementById('usersContainer');
        container.innerHTML = users.map(user => {
            const userTasks = tasks.filter(t => t.assigneeId === user.id);
            return `
                <div class="col">
                    <div class="card h-100 shadow-sm">
                        <div class="card-header bg-white py-3">
                            <h6 class="mb-0 fw-bold text-primary"><i class="bi bi-person-fill me-2"></i>${user.email}</h6>
                            <small class="text-muted">Назначено задач: ${userTasks.length}</small>
                        </div>
                        <div class="card-body">
                            ${userTasks.length === 0
                ? '<p class="text-muted small mb-0">Задачи отсутствуют</p>'
                : `<ul class="list-group list-group-flush small">
                                    ${userTasks.map(t => `
                                        <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                                            <span class="${t.status === 'DONE' ? 'text-decoration-line-through text-muted' : ''}">${t.title}</span>
                                            <span class="badge ${t.status === 'DONE' ? 'bg-success' : 'bg-primary'} font-monospace" style="font-size: 0.7rem;">
                                                ${t.status === 'DONE' ? 'Done' : 'Wait'}
                                            </span>
                                        </li>
                                    `).join('')}
                                   </ul>`
            }
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }
</script>
</body>
</html>
